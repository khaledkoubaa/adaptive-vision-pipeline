task: classify
experiment_name: classification_baseline
output_dir: outputs
seed: 42
device: auto

data:
  root: data
  train_images: data/images/train
  val_images: data/images/val
  train_annotations: data/annotations/train.json
  val_annotations: data/annotations/val.json
  num_workers: 4

model:
  backbone: resnet50
  pretrained: true
  num_classes: 20
  enable_masks: false

train:
  batch_size: 32
  num_epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0001
  lr_scheduler: cosine
  lr_step_size: 10
  lr_gamma: 0.1
  momentum: 0.9
  amp: true
  grad_clip: 1.0
  early_stopping_patience: 10
