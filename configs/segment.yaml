task: segment
experiment_name: segmentation_baseline
output_dir: outputs
seed: 42
device: auto

data:
  root: data
  train_images: data/images/train
  val_images: data/images/val
  train_annotations: data/annotations/train.json
  val_annotations: data/annotations/val.json
  num_workers: 4

model:
  backbone: resnet50
  pretrained: true
  num_classes: 21   # 20 object classes + background
  enable_masks: true

train:
  batch_size: 2
  num_epochs: 50
  learning_rate: 0.005
  weight_decay: 0.0005
  lr_scheduler: step
  lr_step_size: 15
  lr_gamma: 0.1
  momentum: 0.9
  amp: true
  grad_clip: 1.0
  early_stopping_patience: 15
